<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROULETA MUNDIAL - CHEERS O BAR</title>
    <style>
      body { background-color: #000; margin: 0; }
      #root:empty::before {
        content: 'A CARREGAR...';
        color: #d97706;
        font-family: sans-serif;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-weight: bold;
        letter-spacing: 0.2em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;background:red;color:white;z-index:9999;padding:10px;font-size:10px';
        errorDiv.textContent = 'Error: ' + msg + ' @ ' + url + ':' + line;
        document.body.appendChild(errorDiv);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
